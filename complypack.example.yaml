# ComplyPack Configuration Example
# This file shows all supported schema source types

# Globally unique pack identifier (reverse-domain convention).
# Survives registry moves and distinguishes packs from different authors.
id: io.complytime.example

# Provider plugin that evaluates this pack's content.
# Must match the provider's registered ID (e.g., "opa" matches opa-provider).
evaluator-id: opa

# ComplyPack artifact version
version: 0.1.0

# Gemara artifact sources (catalogs, guidance, policies)
# Each source is loaded independently; artifacts merge by metadata.id
gemara:
  sources:
    - source: file://./catalogs/my-controls.yaml
    # Add more sources as needed:
    # - source: file://./guidance/nist-800-53.yaml
    # - source: oci://ghcr.io/org/controls:v1
    #   plain-http: true
  # Legacy single-source format (still supported):
  # source: file://./catalogs/my-controls.yaml

# Platform schemas - multiple source types supported
# Built-in platforms are listed in schemas/index.yaml (e.g., ci-github-actions,
# kubernetes-deployment). Custom platforms can be registered with an explicit source.
schemas:
  # Built-in platform (source resolved from schema index)
  - platform: ci-github-actions

  # Built-in Kubernetes resource type
  - platform: kubernetes-deployment

  # Explicit CUE registry source (overrides index or registers custom platform)
  - platform: ci-gitlab
    source: cue://cue.dev/x/gitlab/gitlabci#Pipeline

  # HTTPS download (custom platform)
  - platform: terraform
    source: https://example.com/schemas/terraform.json

  # Local file (custom platform)
  - platform: docker
    source: file://./schemas/docker.cue

  # Legacy path syntax (backward compatible)
  - platform: my-custom
    path: ./schemas/custom.cue

# Optional: policy generation directories
policies:
  dir: policies/
  helpers:
    - helpers/common.rego

# Optional: test configuration
tests:
  dir: tests/

# Optional: test fixtures
fixtures:
  dir: fixtures/

# Optional: output directory for generated artifacts
output:
  dir: out/
